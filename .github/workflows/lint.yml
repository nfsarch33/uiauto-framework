name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26.x"
          go-package: ./...
